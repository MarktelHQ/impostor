<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostor Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #e84393 60%, #fd79a8 80%, #fdcb6e 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
  }
  .container {
    background: #fff;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  h1 {
    font-size: 2.4em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #667eea, #e84393);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 1em; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Setup */
  .player-inputs { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; max-height: 320px; overflow-y: auto; padding-right: 4px; }
  .player-row { display: flex; align-items: center; gap: 10px; }
  .player-row .avatar-small {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff; font-weight: bold;
    overflow: hidden;
  }
  .player-row input {
    flex: 1; padding: 12px 16px; border-radius: 12px; border: 2px solid #e0e0e0;
    font-size: 1em; transition: border-color 0.3s;
  }
  .player-row input:focus { outline: none; border-color: #667eea; }
  .player-row .remove-btn {
    background: #ff6b6b; color: #fff; border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
  }
  .player-row .remove-btn:hover { transform: scale(1.15); }

  .btn {
    padding: 14px 32px; border: none; border-radius: 14px; font-size: 1.1em;
    cursor: pointer; transition: all 0.3s; font-weight: 600; margin: 6px;
  }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
  .btn-secondary { background: #f0f0f0; color: #555; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-success { background: linear-gradient(135deg, #00b894, #00cec9); color: #fff; }
  .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,184,148,0.5); }
  .btn-add { background: linear-gradient(135deg, #fdcb6e, #e17055); color: #fff; }
  .btn-add:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .player-count { color: #888; font-size: 0.9em; margin-bottom: 8px; }

  /* Reveal */
  .reveal-avatar {
    width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .reveal-name { font-size: 1.6em; font-weight: 700; margin-bottom: 20px; color: #333; }
  .word-card {
    background: #f8f9fa; border-radius: 16px; padding: 28px 20px; margin: 16px 0;
    position: relative; cursor: pointer; border: 3px dashed #ccc; transition: all 0.3s;
    user-select: none;
  }
  .word-card.revealed { border: 3px solid #00b894; background: linear-gradient(135deg, #dfe6e9, #b2bec3); }
  .word-card .tap-text { color: #aaa; font-size: 1em; }
  .word-card .word {
    font-size: 2em; font-weight: 800; display: none;
    background: linear-gradient(135deg, #e84393, #fd79a8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .word-card .word.impostor-word {
    background: linear-gradient(135deg, #d63031, #e17055);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .word-card.revealed .tap-text { display: none; }
  .word-card.revealed .word { display: block; }
  .pass-info { color: #888; font-size: 0.85em; margin-top: 12px; }

  /* Ready */
  .ready-screen-icon { font-size: 80px; margin-bottom: 16px; }
  .ready-name { font-size: 1.4em; font-weight: 600; color: #555; margin-bottom: 20px; }

  /* Go */
  .go-icon { font-size: 100px; margin-bottom: 16px; }
  .go-text { font-size: 1.4em; color: #555; margin-bottom: 24px; }

  /* Confetti */
  .confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 999;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; top: -20px;
    animation: confetti-fall 3s ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .emoji-bg {
    position: absolute; font-size: 120px; opacity: 0.06; top: -20px; right: -20px;
    transform: rotate(15deg); pointer-events: none;
  }

  .players-list {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0;
  }
  .player-chip {
    display: flex; align-items: center; gap: 6px; background: #f0f0f0;
    padding: 6px 14px; border-radius: 20px; font-size: 0.9em; font-weight: 600;
  }
  .player-chip .chip-avatar {
    width: 28px; height: 28px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 14px; color: #fff;
  }
</style>
</head>
<body>

<div class="container">
  <div class="emoji-bg">🕵️</div>

  <!-- SCREEN 1: Setup -->
  <div class="screen active" id="screen-setup">
    <h1>🕵️ Impostor</h1>
    <p class="subtitle">Enter player names to begin!</p>
    <p class="player-count" id="player-count">3 / 8 players</p>
    <div class="player-inputs" id="player-inputs"></div>
    <div style="margin-top: 12px;">
      <button class="btn btn-add" id="btn-add" onclick="addPlayer()">+ Add Player</button>
    </div>
    <div style="margin-top: 20px;">
      <button class="btn btn-primary" id="btn-start" onclick="startGame()">🎮 Start Game</button>
    </div>
  </div>

  <!-- SCREEN 2: Ready (pass device) -->
  <div class="screen" id="screen-ready">
    <div class="ready-screen-icon">📱</div>
    <p class="ready-name" id="ready-name">Pass the device to...</p>
    <button class="btn btn-primary" id="btn-ready" onclick="showReveal()">I'm Ready!</button>
  </div>

  <!-- SCREEN 3: Reveal word -->
  <div class="screen" id="screen-reveal">
    <div class="reveal-avatar" id="reveal-avatar">🐱</div>
    <div class="reveal-name" id="reveal-name">Player</div>
    <div class="word-card" id="word-card" onclick="revealWord()">
      <div class="tap-text">👆 Tap to see your word</div>
      <div class="word" id="reveal-word">WORD</div>
    </div>
    <p class="pass-info" id="pass-info">Remember your word, then pass the device!</p>
    <button class="btn btn-success" id="btn-next" onclick="nextPlayer()" style="display:none;">✅ Got it! Next →</button>
  </div>

  <!-- SCREEN 4: Go play -->
  <div class="screen" id="screen-go">
    <div class="go-icon">🎉</div>
    <h1 style="margin-bottom: 12px;">Let's Go!</h1>
    <p class="go-text">Everyone has their word.<br>Find the impostor!</p>
    <div class="players-list" id="players-list"></div>
    <div style="margin-top: 20px;">
      <button class="btn btn-primary" onclick="resetGame()">🔄 New Game</button>
    </div>
  </div>
</div>

<div class="confetti-container" id="confetti-container"></div>

<script>
const AVATAR_IMAGES = [
  'https://impostor-seven-tau.vercel.app/image1.png',
];
const AVATAR_BGS = ['#ff6b6b','#feca57','#ff9f43','#00b894','#54a0ff','#a29bfe','#636e72','#e17055'];
let shuffledAvatars = [];

function shuffleAvatars(count) {
  const indices = Array.from({length: count}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  shuffledAvatars = indices.map(i => ({
    img: AVATAR_IMAGES[i % AVATAR_IMAGES.length],
    bg: AVATAR_BGS[i]
  }));
}

const WORDS = [
  { en: 'Banana', de: 'Banane' },
  { en: 'Guitar', de: 'Gitarre' },
  { en: 'Mountain', de: 'Berg' },
  { en: 'Bicycle', de: 'Fahrrad' },
  { en: 'Rainbow', de: 'Regenbogen' },
  { en: 'Umbrella', de: 'Regenschirm' },
  { en: 'Dolphin', de: 'Delfin' },
  { en: 'Volcano', de: 'Vulkan' },
  { en: 'Pancake', de: 'Pfannkuchen' },
  { en: 'Treasure', de: 'Schatz' },
  { en: 'Rocket', de: 'Rakete' },
  { en: 'Penguin', de: 'Pinguin' },
  { en: 'Waterfall', de: 'Wasserfall' },
  { en: 'Tornado', de: 'Tornado' },
  { en: 'Diamond', de: 'Diamant' },
  { en: 'Pirate', de: 'Pirat' },
  { en: 'Snowflake', de: 'Schneeflocke' },
  { en: 'Butterfly', de: 'Schmetterling' },
  { en: 'Castle', de: 'Schloss' },
  { en: 'Waffle', de: 'Waffel' },
  { en: 'Jellyfish', de: 'Qualle' },
  { en: 'Firework', de: 'Feuerwerk' },
  { en: 'Dragon', de: 'Drache' },
  { en: 'Pretzel', de: 'Brezel' },
  { en: 'Elephant', de: 'Elefant' },
  { en: 'Coconut', de: 'Kokosnuss' },
  { en: 'Igloo', de: 'Iglu' },
  { en: 'Popcorn', de: 'Popcorn' },
  { en: 'Starfish', de: 'Seestern' },
  { en: 'Trampoline', de: 'Trampolin' },
  { en: 'Giraffe', de: 'Giraffe' },
  { en: 'Candle', de: 'Kerze' },
  { en: 'Spaghetti', de: 'Spaghetti' },
  { en: 'Airplane', de: 'Flugzeug' },
  { en: 'Mushroom', de: 'Pilz' },
  { en: 'Cupcake', de: 'Cupcake' },
  { en: 'Parrot', de: 'Papagei' },
  { en: 'Brownie', de: 'Brownie' },
  { en: 'Tottenham', de: 'Tottenham' },
  { en: 'Arsenal', de: 'Arsenal' },
  { en: 'Harry Kane', de: 'Harry Kane' },
  { en: 'Bukayo Saka', de: 'Bukayo Saka' },
  { en: 'Yann Sommer', de: 'Yann Sommer' },
  { en: 'Xherdan Shaqiri', de: 'Xherdan Shaqiri' },
  { en: 'Football', de: 'Fussball' },
  { en: 'Goal', de: 'Tor' },
  { en: 'Trophy', de: 'Pokal' },
  { en: 'Emirates A380', de: 'Emirates A380' },
  { en: 'Helicopter', de: 'Hubschrauber' },
  { en: 'Hot Air Balloon', de: 'Heissluftballon' },
  { en: 'Fondue', de: 'Fondue' },
  { en: 'Matterhorn', de: 'Matterhorn' },
  { en: 'Davos', de: 'Davos' },
  { en: 'Center Parcs', de: 'Center Parcs' },
  { en: 'Chocolate', de: 'Schokolade' },
  { en: 'Skiing', de: 'Skifahren' },
  { en: 'Raclette', de: 'Raclette' },
  { en: 'Lake', de: 'See' },
  { en: 'Dinosaur', de: 'Dinosaurier' },
  { en: 'Unicorn', de: 'Einhorn' },
  { en: 'Robot', de: 'Roboter' },
  { en: 'Superhero', de: 'Superheld' },
  { en: 'Ice Cream', de: 'Eiscreme' },
  { en: 'Lollipop', de: 'Lutscher' },
  { en: 'Teddy Bear', de: 'Teddyb\u00e4r' },
  { en: 'Sandcastle', de: 'Sandburg' },
  { en: 'Treehouse', de: 'Baumhaus' },
  { en: 'Rollercoaster', de: 'Achterbahn' },
  { en: 'Swimming Pool', de: 'Schwimmbad' },
  { en: 'Lego', de: 'Lego' },
  { en: 'Pikachu', de: 'Pikachu' },
  { en: 'Ninja', de: 'Ninja' },
  { en: 'Wizard', de: 'Zauberer' },
  { en: 'Princess', de: 'Prinzessin' },
  { en: 'Treasure Map', de: 'Schatzkarte' },
  { en: 'Spaceship', de: 'Raumschiff' },
  { en: 'Monster Truck', de: 'Monstertruck' },
  { en: 'Water Slide', de: 'Wasserrutsche' },
  { en: 'Cotton Candy', de: 'Zuckerwatte' },
  { en: 'Pizza', de: 'Pizza' },
  { en: 'Crocodile', de: 'Krokodil' },
  { en: 'Tiger', de: 'Tiger' },
  { en: 'Octopus', de: 'Oktopus' },
  { en: 'Snowman', de: 'Schneemann' },
  { en: 'Christmas Tree', de: 'Weihnachtsbaum' },
];

let players = [];
let currentPlayerIndex = 0;
let impostorIndex = -1;
let secretWord = '';

function init() {
  const inputs = document.getElementById('player-inputs');
  inputs.innerHTML = '';
  for (let i = 0; i < 3; i++) addPlayer();
}

function addPlayer() {
  const count = document.querySelectorAll('.player-row').length;
  if (count >= 8) return;
  const inputs = document.getElementById('player-inputs');
  const i = count;
  const bg = AVATAR_BGS[i];
  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `
    <div class="avatar-small" style="background:${bg}"><img src="${AVATAR_IMAGES[i % AVATAR_IMAGES.length]}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>
    <input type="text" placeholder="Player ${i + 1}" maxlength="16" class="player-name-input">
    ${i >= 3 ? `<button class="remove-btn" onclick="removePlayer(this)">×</button>` : ''}
  `;
  inputs.appendChild(row);
  updateCount();
}

function removePlayer(btn) {
  btn.closest('.player-row').remove();
  refreshAvatars();
  updateCount();
}

function refreshAvatars() {
  const rows = document.querySelectorAll('.player-row');
  rows.forEach((row, i) => {
    const bg = AVATAR_BGS[i];
    row.querySelector('.avatar-small').style.background = bg;
    row.querySelector('.avatar-small').innerHTML = `<img src="${AVATAR_IMAGES[i % AVATAR_IMAGES.length]}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    row.querySelector('input').placeholder = `Player ${i + 1}`;
    const rm = row.querySelector('.remove-btn');
    if (i < 3 && rm) rm.remove();
    if (i >= 3 && !rm) {
      const b = document.createElement('button');
      b.className = 'remove-btn';
      b.textContent = '×';
      b.onclick = function() { removePlayer(this); };
      row.appendChild(b);
    }
  });
}

function updateCount() {
  const c = document.querySelectorAll('.player-row').length;
  document.getElementById('player-count').textContent = `${c} / 8 players`;
  document.getElementById('btn-add').disabled = c >= 8;
  document.getElementById('btn-start').disabled = c < 3;
}

function startGame() {
  const inputs = document.querySelectorAll('.player-name-input');
  players = [];
  inputs.forEach((inp, i) => {
    players.push({ name: inp.value.trim() || `Player ${i + 1}`, img: AVATAR_IMAGES[i % AVATAR_IMAGES.length], bg: AVATAR_BGS[i] });
  });
  if (players.length < 3) return;

  const wordObj = WORDS[Math.floor(Math.random() * WORDS.length)];
  secretWord = wordObj;
  impostorIndex = Math.floor(Math.random() * players.length);
  currentPlayerIndex = 0;

  showScreen('screen-ready');
  updateReady();
}

function updateReady() {
  const p = players[currentPlayerIndex];
  document.getElementById('ready-name').innerHTML =
    `Pass the device to <strong>${p.name}</strong><br><img src="${p.img}" style="width:60px;height:60px;border-radius:50%;margin-top:10px;object-fit:cover;">`;
}

function showReveal() {
  const p = players[currentPlayerIndex];
  const isImpostor = currentPlayerIndex === impostorIndex;

  document.getElementById('reveal-avatar').innerHTML = `<img src="${p.img}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  document.getElementById('reveal-avatar').style.background = p.bg;
  document.getElementById('reveal-name').textContent = p.name;

  const wordEl = document.getElementById('reveal-word');
  if (isImpostor) {
    wordEl.innerHTML = 'IMPOSTOR';
  } else {
    wordEl.innerHTML = secretWord.en + '<br><span style="font-size:0.55em;opacity:0.7;-webkit-text-fill-color:#888;">' + secretWord.de + '</span>';
  }
  wordEl.className = isImpostor ? 'word impostor-word' : 'word';

  const card = document.getElementById('word-card');
  card.classList.remove('revealed');
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('pass-info').style.display = 'block';

  showScreen('screen-reveal');
}

function revealWord() {
  const card = document.getElementById('word-card');
  if (card.classList.contains('revealed')) return;
  card.classList.add('revealed');
  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextPlayer() {
  currentPlayerIndex++;
  if (currentPlayerIndex >= players.length) {
    showGoScreen();
  } else {
    showScreen('screen-ready');
    updateReady();
  }
}

function showGoScreen() {
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  players.forEach(p => {
    list.innerHTML += `<div class="player-chip"><div class="chip-avatar" style="background:${p.bg}"><img src="${p.img}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>${p.name}</div>`;
  });
  showScreen('screen-go');
  launchConfetti();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function resetGame() {
  showScreen('screen-setup');
}

function launchConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#ff6b6b','#feca57','#ff9f43','#00b894','#54a0ff','#a29bfe','#e84393','#fd79a8'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 4000);
}

init();
</script>
</body>
</html>
